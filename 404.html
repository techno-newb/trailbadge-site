<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Off trail — Trailbadge Co.</title>
<link rel="icon" href="/favicon.ico" sizes="32x32" />
<link rel="icon" href="/favicon.svg" type="image/svg+xml" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,600;12..96,800&family=Hanken+Grotesk:wght@400;500&family=Space+Mono&display=swap" rel="stylesheet" />
<style>
  :root {
    --spruce: #142c26;
    --pine: #1f4a3f;
    --brass: #c6923e;
    --brass-deep: #a9772c;
    --paper: #efe9d9;
    --ink-soft: #4a5a53;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--paper);
    color: var(--spruce);
    font-family: "Hanken Grotesk", system-ui, sans-serif;
    min-height: 100vh;
    display: grid;
    place-items: center;
    text-align: center;
    padding: 24px;
    overflow: hidden;
  }
  .topo { position: fixed; inset: 0; z-index: 0; pointer-events: none; opacity: 0.5; }
  .panel { position: relative; z-index: 1; }
  .patch {
    width: 120px; height: 120px; margin: 0 auto 30px;
    border-radius: 50%;
    background: radial-gradient(circle at 50% 38%, var(--pine), var(--spruce) 72%);
    box-shadow: 0 12px 26px rgba(20,44,38,0.24);
    display: grid; place-items: center; position: relative;
  }
  .patch::before {
    content: ""; position: absolute; inset: 10px; border-radius: 50%;
    border: 2px dashed rgba(198,146,62,0.55);
  }
  .patch svg { position: relative; z-index: 2; }
  .code {
    font-family: "Space Mono", monospace;
    font-size: 13px; letter-spacing: 0.24em; text-transform: uppercase;
    color: var(--brass-deep); margin-bottom: 14px;
  }
  h1 {
    font-family: "Bricolage Grotesque", sans-serif;
    font-weight: 800; font-size: clamp(40px, 9vw, 68px);
    line-height: 1; letter-spacing: -0.03em; margin-bottom: 16px;
  }
  p { color: var(--ink-soft); font-size: 18px; max-width: 40ch; margin: 0 auto 34px; }
  a.home {
    display: inline-flex; align-items: center; gap: 9px;
    background: var(--spruce); color: var(--paper);
    font-weight: 600; font-size: 15px; text-decoration: none;
    padding: 13px 24px; border-radius: 2px;
    transition: background 0.16s ease, transform 0.16s ease;
  }
  a.home:hover { background: var(--pine); transform: translateY(-2px); }
  @media (prefers-reduced-motion: reduce) { a.home:hover { transform: none; } }
</style>
</head>
<body>
<svg class="topo" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" viewBox="0 0 1200 800" aria-hidden="true">
  <g fill="none" stroke="#1f4a3f" stroke-width="1" opacity="0.16">
    <path d="M-50 160 Q 320 80 610 170 T 1250 150" />
    <path d="M-50 300 Q 300 220 600 310 T 1250 280" />
    <path d="M-50 450 Q 340 360 620 460 T 1250 430" />
    <path d="M-50 600 Q 300 510 600 610 T 1250 580" />
  </g>
</svg>
<div class="panel">
  <div class="patch">
    <svg width="46" height="46" viewBox="0 0 46 46" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
      <circle cx="23" cy="23" r="15" stroke="#efe9d9" stroke-width="2.4"/>
      <path d="M23 12 V23 L30 27" stroke="#c6923e" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/>
      <path d="M23 8 V11 M23 35 V38 M8 23 H11 M35 23 H38" stroke="#efe9d9" stroke-width="2.4" stroke-linecap="round"/>
    </svg>
  </div>
  <div class="code">Error 404</div>
  <h1>Off trail.</h1>
  <p>This page isn't on the map. The badge you're looking for may have moved or never existed.</p>
  <a class="home" href="/">Back to Trailbadge Co.</a>
</div>
</body>
</html>
